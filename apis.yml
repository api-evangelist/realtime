  name: Daily
  description: A WebRTC video API provider offering Prebuilt embeddable video rooms, a Client SDK for custom apps, and Realtime Transport for AI Agents — the underlying infrastructure for Pipecat-deployed voice agents. Daily frames Pipecat as "a vendor-neutral open source orchestration framework for realtime voice and multimodal AI agents."
