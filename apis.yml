  # Open-source realtime frameworks
- aid: realtime:socket-io
  name: Socket.IO
  description: A widely deployed open-source realtime engine for Node.js (with clients across JavaScript, Java, Swift, Kotlin, .NET, Python) that layers reconnection, rooms, namespaces, and binary support on top of WebSocket (with HTTP long-polling fallback). Powers chat, dashboards, and collaboration in thousands of production apps.
  humanURL: https://socket.io/
  tags:
  - WebSocket
  - Open Source
  - Framework
  - Node.js
  properties:
  - type: Portal
    url: https://socket.io/
  - type: Documentation
    url: https://socket.io/docs/v4/
  - type: GitHubOrganization
    url: https://github.com/socketio

- aid: realtime:phoenix-channels
  name: Phoenix Channels
  description: The realtime layer of the Elixir Phoenix Framework — soft-realtime channels, presence, and pub/sub built on the BEAM VM. Channels carry WebSocket (or long-poll fallback) topics with broadcast/subscribe semantics; Phoenix Presence implements CRDT-based distributed presence tracking.
  humanURL: https://hexdocs.pm/phoenix/channels.html
  tags:
  - Elixir
  - Phoenix
  - WebSocket
  - Channels
  - Open Source
  properties:
  - type: Portal
    url: https://www.phoenixframework.org/
  - type: Documentation
    url: https://hexdocs.pm/phoenix/channels.html
  - type: GitHubOrganization
    url: https://github.com/phoenixframework

- aid: realtime:centrifugo
  name: Centrifugo
  description: An open-source language-agnostic realtime messaging server providing WebSocket, SSE, HTTP streaming, and WebTransport transports with channel-based pub/sub, presence, history, and JWT-based access tokens. Designed to offload realtime fanout from application backends.
  humanURL: https://centrifugal.dev/
  tags:
  - WebSocket
  - Pub Sub
  - Open Source
  - Realtime Server
  properties:
  - type: Portal
    url: https://centrifugal.dev/
  - type: Documentation
    url: https://centrifugal.dev/docs/getting-started/introduction
  - type: GitHubOrganization
    url: https://github.com/centrifugal

  # Push notification systems
- aid: realtime:onesignal
  name: OneSignal
  description: A multichannel customer messaging platform with Push (mobile + web), Email, SMS & RCS, and In-App Messages — framed as letting teams "set up and send mobile and web push notifications with advanced targeting and automation." Provides REST APIs, SDKs, and a hosted console.
  humanURL: https://onesignal.com/
  tags:
  - Push Notifications
  - Mobile
  - Web Push
  - Provider
  properties:
  - type: Portal
    url: https://onesignal.com/
  - type: Documentation
    url: https://documentation.onesignal.com/
  - type: APIReference
    url: https://documentation.onesignal.com/reference
  - type: Pricing
    url: https://onesignal.com/pricing
  - type: GitHubOrganization
    url: https://github.com/OneSignal

- aid: realtime:firebase-cloud-messaging
  name: Firebase Cloud Messaging (FCM)
  description: Google's cross-platform push notification and message delivery service for Android, iOS, and web. FCM uses HTTP v1 API for server-to-FCM message submission and a long-lived connection (XMPP-derived on Android, APNs for iOS, Web Push for browsers) for FCM-to-device delivery.
  humanURL: https://firebase.google.com/products/cloud-messaging
  tags:
  - Push Notifications
  - Mobile
  - Google
  - Provider
  properties:
  - type: Portal
    url: https://firebase.google.com/products/cloud-messaging
  - type: Documentation
    url: https://firebase.google.com/docs/cloud-messaging
  - type: APIReference
    url: https://firebase.google.com/docs/reference/fcm/rest

- aid: realtime:apple-push-notification-service
  name: Apple Push Notification Service (APNs)
  description: Apple's push notification system for iOS, iPadOS, macOS, tvOS, watchOS, and visionOS. APNs uses an HTTP/2-based provider API with token-based or certificate-based authentication for server-to-Apple delivery, and a persistent device connection for Apple-to-device delivery.
  humanURL: https://developer.apple.com/documentation/usernotifications
  tags:
  - Push Notifications
  - Apple
  - iOS
  - HTTP/2
  - Provider
  properties:
  - type: Portal
    url: https://developer.apple.com/documentation/usernotifications
  - type: Documentation
    url: https://developer.apple.com/documentation/usernotifications/sending-notification-requests-to-apns

- aid: realtime:web-push
  name: Web Push API
  description: An IETF-standardized push system for the web, comprising the W3C Push API (browser-side subscription), the IETF Web Push Protocol (RFC 8030, server-to-push-service delivery), and Message Encryption for Web Push (RFC 8291). Routed via vendor push services (Mozilla autopush, Apple Push, FCM Web Push).
  humanURL: https://www.w3.org/TR/push-api/
  tags:
  - Push Notifications
  - Web
  - Standard
  - Browser
  properties:
  - type: Specification
    url: https://www.w3.org/TR/push-api/
  - type: Specification
    url: https://datatracker.ietf.org/doc/html/rfc8030
  - type: Specification
    url: https://datatracker.ietf.org/doc/html/rfc8291

- aid: realtime:pushwoosh
  name: Pushwoosh
  description: A customer engagement platform offering push notifications (mobile + web), in-app messaging, email, and SMS with segmentation, journeys, and a Customer Journey Builder. Uses native vendor push gateways (FCM, APNs, Web Push) under the hood.
  humanURL: https://www.pushwoosh.com/
