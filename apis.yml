- aid: realtime:pubnub
  name: PubNub
  description: A realtime platform offering Pub/Sub messaging, Presence detection, Chat SDKs, Functions (serverless), Events & Actions, Insights analytics, BizOps Workspace, Illuminate, and an Admin API. PubNub markets "Send a message via API and have it delivered anywhere in less than 30 ms" as its latency guarantee.
