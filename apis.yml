- aid: realtime:cloudflare-realtime
  name: Cloudflare Realtime
  description: Cloudflare's realtime media stack — RealtimeKit (SDKs and APIs for live video/voice), the Realtime SFU ("a powerful media server that efficiently routes video and audio"), and a managed TURN Service for WebRTC NAT traversal over UDP/TCP/TLS — running on Cloudflare's global edge network.
