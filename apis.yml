- aid: realtime:pusher
  name: Pusher
  description: A hosted realtime API from MessageBird offering two products — Channels (pub/sub messaging) and Beams (push notifications) — under the framing "Our hosted APIs are flexible, scalable, and easy to integrate." Pusher Channels uses a proprietary WebSocket protocol with broad SDK coverage.
