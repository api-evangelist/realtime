- aid: realtime:amazon-ivs
  name: Amazon Interactive Video Service (IVS)
  description: AWS's low-latency interactive video service. IVS Real-Time Streaming offers WebRTC-based stages for multi-host interactivity; IVS Low-Latency Streaming offers HLS-based one-to-many delivery. IVS Chat provides a managed realtime chat service alongside the video stream.
