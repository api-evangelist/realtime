- aid: realtime:livekit
  name: LiveKit
  description: An open-source WebRTC platform marketed as "The platform for voice, video, and physical AI agents." LiveKit ships an SFU media server, Agents framework for production realtime AI, server SDKs in Go/Node/Python/Ruby, and client SDKs for JavaScript, Swift, Android, and Flutter. Available self-hosted or as LiveKit Cloud.
