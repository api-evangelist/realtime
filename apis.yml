apis:
- aid: realtime:websocket
  name: WebSocket
  description: A full-duplex communication protocol over a single TCP connection, standardized by the IETF as RFC 6455 and defined in the WHATWG WebSocket API on the client side. WebSocket is the most widely deployed realtime protocol on the web — used for chat, multiplayer, live dashboards, collaboration, and as the carrier for higher-level realtime SDKs from Ably, Pusher, PubNub, Phoenix Channels, Socket.IO, and others.
  humanURL: https://datatracker.ietf.org/doc/html/rfc6455
  baseURL: wss://
  tags:
  - WebSocket
  - Protocol
  - Bidirectional
  - Standard
  properties:
  - type: Specification
    url: https://datatracker.ietf.org/doc/html/rfc6455
  - type: Documentation
    url: https://developer.mozilla.org/en-US/docs/Web/API/WebSockets_API
  - type: ClientAPI
    url: https://websockets.spec.whatwg.org/

- aid: realtime:server-sent-events
  name: Server-Sent Events (SSE)
  description: A unidirectional server-to-client streaming protocol over HTTP, defined by the WHATWG HTML Living Standard. SSE is simpler than WebSocket — it reuses HTTP and supports automatic reconnection — but is one-way only. It has seen a resurgence as the carrier for LLM token streams from OpenAI, Anthropic, and other AI APIs.
  humanURL: https://html.spec.whatwg.org/multipage/server-sent-events.html
  baseURL: https://
  tags:
  - SSE
  - Server-Sent Events
  - Protocol
  - Unidirectional
  - Standard
  properties:
  - type: Specification
    url: https://html.spec.whatwg.org/multipage/server-sent-events.html
  - type: Documentation
    url: https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events

- aid: realtime:webrtc
  name: WebRTC
  description: A peer-to-peer realtime communication framework for audio, video, and arbitrary data channels, standardized by the W3C and IETF. WebRTC defines an SDP-based offer/answer signaling model, ICE/STUN/TURN for NAT traversal, SRTP for media, and SCTP-based data channels. It powers video conferencing (LiveKit, Daily, Agora, Twilio Video, Zoom Web), live audio rooms, and low-latency game streaming.
  humanURL: https://webrtc.org/
  tags:
  - WebRTC
  - Peer-to-Peer
  - Video
  - Audio
  - Data Channel
  - Protocol
  - Standard
  properties:
  - type: Specification
    url: https://www.w3.org/TR/webrtc/
  - type: Documentation
    url: https://developer.mozilla.org/en-US/docs/Web/API/WebRTC_API
  - type: Portal
    url: https://webrtc.org/

- aid: realtime:mqtt
  name: MQTT
  description: A lightweight publish/subscribe protocol standardized by OASIS, designed for constrained devices and low-bandwidth networks. MQTT is the dominant realtime protocol in IoT, used by AWS IoT Core, Azure IoT Hub, Google Cloud IoT, HiveMQ, EMQX, and Mosquitto. MQTT v5 adds shared subscriptions, message expiry, reason codes, and topic aliases.
  humanURL: https://mqtt.org/
  tags:
  - MQTT
  - IoT
  - Pub Sub
  - Protocol
  - Standard
  properties:
  - type: Specification
    url: https://docs.oasis-open.org/mqtt/mqtt/v5.0/mqtt-v5.0.html
  - type: Portal
    url: https://mqtt.org/

- aid: realtime:coap
  name: CoAP
  description: The Constrained Application Protocol, defined in IETF RFC 7252, is a RESTful protocol for constrained devices over UDP, with an Observe extension (RFC 7641) that provides realtime resource notification. CoAP is used in industrial IoT and LPWAN deployments where MQTT's TCP overhead is undesirable.
  humanURL: https://datatracker.ietf.org/doc/html/rfc7252
  tags:
  - CoAP
  - IoT
  - Constrained Devices
  - Protocol
  - Standard
  properties:
  - type: Specification
    url: https://datatracker.ietf.org/doc/html/rfc7252
  - type: Specification
    url: https://datatracker.ietf.org/doc/html/rfc7641

- aid: realtime:grpc-streaming
  name: gRPC Streaming
  description: gRPC supports four call patterns — unary, server streaming, client streaming, and bidirectional streaming — all carried over HTTP/2. gRPC streams are widely used for internal service-to-service realtime communication, with gRPC-Web bridging to browsers and Connect protocol providing buf.build's HTTP/JSON-friendly alternative.
  humanURL: https://grpc.io/docs/what-is-grpc/core-concepts/
  tags:
  - gRPC
  - Streaming
  - Bidirectional
  - HTTP/2
  - Protocol
  properties:
  - type: Documentation
    url: https://grpc.io/docs/what-is-grpc/core-concepts/
  - type: Specification
    url: https://github.com/grpc/grpc/blob/master/doc/PROTOCOL-HTTP2.md

- aid: realtime:graphql-subscriptions
  name: GraphQL Subscriptions
  description: A GraphQL operation type that delivers realtime updates to clients, typically carried over WebSocket using the graphql-ws or legacy graphql-transport-ws protocol, or over SSE using the GraphQL-SSE protocol. Subscriptions are supported by Apollo, Hasura, AWS AppSync, and most production GraphQL servers.
  humanURL: https://spec.graphql.org/October2021/#sec-Subscription
  tags:
  - GraphQL
  - Subscriptions
  - Realtime
  - WebSocket
  properties:
  - type: Specification
    url: https://spec.graphql.org/October2021/#sec-Subscription
  - type: Documentation
    url: https://the-guild.dev/graphql/ws

  - url: graphql/realtime-graphql.md
    type: GraphQL
- aid: realtime:webtransport
  name: WebTransport
  description: A modern web API built on HTTP/3 and QUIC providing bidirectional and unidirectional streams plus unreliable datagrams to browsers. Designed as a higher-performance successor to WebSocket for streaming workloads, supported in Chromium-based browsers and progressively adopted in production.
  humanURL: https://www.w3.org/TR/webtransport/
  tags:
  - WebTransport
  - HTTP/3
  - QUIC
  - Browser
  - Standard
  properties:
  - type: Specification
    url: https://www.w3.org/TR/webtransport/
  - type: Documentation
    url: https://developer.mozilla.org/en-US/docs/Web/API/WebTransport_API

  # Hosted realtime providers
- aid: realtime:ably
  name: Ably
  description: A hosted realtime platform offering Pub/Sub Channels, Chat, Spaces, LiveObjects, LiveSync, and AI Transport — built on a global edge network with low-latency multiprotocol fanout (WebSocket, MQTT, SSE, HTTP). Anchored by the documentation framing "Low-level APIs to build any realtime experience" for the Pub/Sub product.
  humanURL: https://ably.com/
  tags:
