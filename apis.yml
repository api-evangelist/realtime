- aid: realtime:twilio-video
  name: Twilio Video / Live
  description: Twilio's realtime video and live streaming products. Twilio Video provides WebRTC-based group rooms and peer rooms; Twilio Live (in select markets) layers low-latency interactive live streaming on top. Both share Twilio's identity, access tokens, and Programmable APIs.
