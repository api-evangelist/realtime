# Common actions across the realtime surface area.
actions:
  - name: subscribe
    description: Express interest in messages on a channel or topic pattern.
  - name: unsubscribe
    description: Cancel a prior subscription.
  - name: publish
    description: Send a message to a channel.
  - name: broadcast
    description: Provider-side fanout of a published message to all subscribers.
  - name: connect
    description: Open the persistent transport connection to the realtime provider.
  - name: disconnect
    description: Tear down the transport connection.
  - name: enter
    description: Record presence membership in a channel.
  - name: leave
    description: Withdraw presence membership.
  - name: history
    description: Fetch retained messages for a channel.
  - name: rewind
    description: Resume subscription from a prior checkpoint.
  - name: signal
    description: Exchange WebRTC SDP/ICE between peers.
  - name: offer
    description: Initiate a WebRTC PeerConnection with an SDP offer.
  - name: answer
    description: Respond to a WebRTC SDP offer.
  - name: addCandidate
    description: Submit an ICE candidate during negotiation.
  - name: notify
    description: Deliver a push notification to a registered device.

